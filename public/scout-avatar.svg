<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="skin" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#f5deb3"/>
      <stop offset="100%" stop-color="#deb887"/>
    </radialGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d1b0e"/>
      <stop offset="100%" stop-color="#1a0f07"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)" rx="20"/>
  <g opacity="0.04" stroke="#00ff88" stroke-width="0.5">
    <line x1="0" y1="40" x2="200" y2="40"/><line x1="0" y1="80" x2="200" y2="80"/>
    <line x1="0" y1="120" x2="200" y2="120"/><line x1="0" y1="160" x2="200" y2="160"/>
    <line x1="40" y1="0" x2="40" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
  </g>

  <!-- Neck -->
  <rect x="85" y="130" width="30" height="20" fill="#deb887" rx="5"/>

  <!-- Shoulders / jacket -->
  <path d="M45 150 Q50 135 85 140 L85 155 Q100 160 115 155 L115 140 Q150 135 155 150 L160 200 L40 200 Z" fill="#2d3748"/>
  <path d="M85 140 L85 155 Q100 158 115 155 L115 140" fill="#1a202c"/>
  <path d="M85 140 L75 148 L85 150 Z" fill="#3d4a5c"/>
  <path d="M115 140 L125 148 L115 150 Z" fill="#3d4a5c"/>
  <rect x="130" y="155" width="22" height="12" rx="2" fill="#1a202c" stroke="#4a5568" stroke-width="0.5"/>
  <text x="141" y="164" font-family="monospace" font-size="6" fill="#00ff88" text-anchor="middle">SQHQ</text>

  <!-- Hair back -->
  <ellipse cx="100" cy="70" rx="42" ry="48" fill="url(#hair)"/>
  <!-- Face -->
  <ellipse cx="100" cy="80" rx="35" ry="40" fill="url(#skin)"/>
  <!-- Hair front -->
  <path d="M65 65 Q70 40 100 35 Q130 40 135 65 Q130 50 100 48 Q70 50 65 65 Z" fill="url(#hair)"/>
  <path d="M63 70 Q58 55 65 45 Q60 60 62 75 Z" fill="url(#hair)"/>
  <path d="M137 70 Q142 55 135 45 Q140 60 138 75 Z" fill="url(#hair)"/>
  <path d="M135 55 Q150 50 148 70 Q145 80 140 75" fill="#2d1b0e"/>

  <!-- Eyebrows -->
  <g class="brows-happy">
    <path d="M78 72 Q85 68 93 72" stroke="#3d2b1f" stroke-width="1.5" fill="none"/>
    <path d="M107 72 Q115 68 122 72" stroke="#3d2b1f" stroke-width="1.5" fill="none"/>
  </g>
  <g class="brows-wtf" style="display:none">
    <path d="M78 68 Q85 74 93 70" stroke="#3d2b1f" stroke-width="2" fill="none"/>
    <path d="M107 70 Q115 74 122 68" stroke="#3d2b1f" stroke-width="2" fill="none"/>
  </g>

  <!-- Eyes - shared base -->
  <ellipse cx="86" cy="80" rx="8" ry="6" fill="white"/>
  <ellipse cx="114" cy="80" rx="8" ry="6" fill="white"/>
  <circle cx="86" cy="80" r="4.5" fill="#7c9a6e"/>
  <circle cx="114" cy="80" r="4.5" fill="#7c9a6e"/>

  <!-- Pupils - happy (centered, relaxed) -->
  <g class="pupils-happy">
    <circle cx="87" cy="80" r="2.2" fill="#1a1a2e"/>
    <circle cx="115" cy="80" r="2.2" fill="#1a1a2e"/>
    <circle cx="88" cy="78" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="116" cy="78" r="1.2" fill="white" opacity="0.8"/>
  </g>
  <!-- Pupils - WTF (wide, looking up/aside) -->
  <g class="pupils-wtf" style="display:none">
    <circle cx="88" cy="78" r="2.8" fill="#1a1a2e"/>
    <circle cx="116" cy="78" r="2.8" fill="#1a1a2e"/>
    <circle cx="89" cy="76" r="1" fill="white" opacity="0.9"/>
    <circle cx="117" cy="76" r="1" fill="white" opacity="0.9"/>
  </g>

  <!-- Eyes - WTF extra white (wider eyes) -->
  <ellipse class="eyes-wtf-extra" cx="86" cy="80" rx="9.5" ry="7.5" fill="white" style="display:none"/>
  <ellipse class="eyes-wtf-extra" cx="114" cy="80" rx="9.5" ry="7.5" fill="white" style="display:none"/>

  <!-- Freckles -->
  <g fill="#c4956a" opacity="0.5">
    <circle cx="78" cy="88" r="1"/><circle cx="82" cy="90" r="0.8"/><circle cx="86" cy="89" r="0.9"/>
    <circle cx="114" cy="89" r="0.9"/><circle cx="118" cy="90" r="0.8"/><circle cx="122" cy="88" r="1"/>
    <circle cx="96" cy="95" r="0.7"/><circle cx="104" cy="95" r="0.7"/><circle cx="100" cy="97" r="0.6"/>
  </g>

  <!-- Nose -->
  <path d="M98 88 Q100 94 102 88" stroke="#c4956a" stroke-width="0.8" fill="none"/>

  <!-- Mouth - happy (smirk) -->
  <path class="mouth-happy" d="M90 100 Q95 104 100 103 Q108 102 112 98" stroke="#c4756a" stroke-width="1.5" fill="none"/>
  <!-- Mouth - WTF (open, gasp) -->
  <g class="mouth-wtf" style="display:none">
    <ellipse cx="100" cy="102" rx="8" ry="6" fill="#8b4540" stroke="#c4756a" stroke-width="1"/>
    <path d="M94 100 Q100 97 106 100" fill="#d4918a" opacity="0.4"/>
  </g>

  <!-- Gold chain -->
  <path d="M80 125 Q85 132 100 134 Q115 132 120 125" stroke="#d4a017" stroke-width="1" fill="none"/>
  <circle cx="100" cy="134" r="2.5" fill="#d4a017"/>

  <!-- Hands - only visible in WTF state -->
  <g class="hands-wtf" style="display:none">
    <!-- Left hand up, palm out -->
    <g transform="translate(25, 45) rotate(-15)">
      <rect x="0" y="0" width="14" height="18" rx="4" fill="#deb887"/>
      <rect x="1" y="-6" width="3" height="8" rx="1.5" fill="#deb887"/>
      <rect x="4.5" y="-8" width="2.5" height="9" rx="1.2" fill="#deb887"/>
      <rect x="7.5" y="-7" width="2.5" height="8" rx="1.2" fill="#deb887"/>
      <rect x="10.5" y="-5" width="2.5" height="7" rx="1.2" fill="#deb887"/>
    </g>
    <!-- Right hand up, palm out -->
    <g transform="translate(161, 45) rotate(15) scale(-1,1) translate(-14,0)">
      <rect x="0" y="0" width="14" height="18" rx="4" fill="#deb887"/>
      <rect x="1" y="-6" width="3" height="8" rx="1.5" fill="#deb887"/>
      <rect x="4.5" y="-8" width="2.5" height="9" rx="1.2" fill="#deb887"/>
      <rect x="7.5" y="-7" width="2.5" height="8" rx="1.2" fill="#deb887"/>
      <rect x="10.5" y="-5" width="2.5" height="7" rx="1.2" fill="#deb887"/>
    </g>
  </g>

  <!-- Status dot -->
  <circle cx="170" cy="25" r="5" fill="#00ff88" opacity="0.8"/>
  <text x="170" y="28" font-family="monospace" font-size="5" fill="#0d1117" text-anchor="middle">✓</text>

  <text x="100" y="195" font-family="monospace" font-size="7" fill="#4a5568" text-anchor="middle">SCOUT // FIELD OPS</text>

  <!-- === Expression toggle via parent data-attribute === -->
  <!-- Default = happy. Set data-expr="wtf" on parent to switch -->
  <style>
    /* When parent has data-expr="wtf" */
    [data-expr="wtf"] .brows-happy { display: none; }
    [data-expr="wtf"] .brows-wtf { display: block; }
    [data-expr="wtf"] .pupils-happy { display: none; }
    [data-expr="wtf"] .pupils-wtf { display: block; }
    [data-expr="wtf"] .eyes-wtf-extra { display: block; }
    [data-expr="wtf"] .mouth-happy { display: none; }
    [data-expr="wtf"] .mouth-wtf { display: block; }
    [data-expr="wtf"] .hands-wtf { display: block; }
  </style>
</svg>